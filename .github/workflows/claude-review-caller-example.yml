name: PR Review

# Drop this file into any repo's .github/workflows/ directory.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  call-claude:
    uses: your-org/claude-pipelines/.github/workflows/claude-review.yml@main
    with:
      model: claude-sonnet-4-6
      max_diff_lines: 1500
      enable_deep_context: false
      custom_instructions: "Follow the conventions in this repo's CLAUDE.md file."
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
